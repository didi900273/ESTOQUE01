<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELETROGUARA 67 - Gestão</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>Sincronizando com a nuvem...</p>
    </div>

    <div id="setup-screen" style="display:none">
        <div class="setup-box">
            <h2>Configuração Inicial</h2>
            <input type="text" id="api-key" placeholder="Sua API Key do JSONBin">
            <input type="text" id="bin-id" placeholder="Seu Bin ID">
            <button class="btn-primary" onclick="saveConfig()">Entrar no Sistema</button>
        </div>
    </div>

    <div id="app-interface" style="display:none">
        <aside class="sidebar">
            <div class="logo">ELETROGUARA 67</div>
            <nav>
                <button onclick="showTab('estoque')">📦 Estoque</button>
                <button onclick="showTab('movimentacoes')">🔄 Movimentações</button>
                <button onclick="reconfig()" class="btn-sec">⚙️ Sair/Trocar ID</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="tab-estoque" class="tab-content active">
                <header class="tab-header">
                    <h2>Inventário</h2>
                    <button class="btn-primary" onclick="openModal('modal-item')">+ Novo Material</button>
                </header>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Material</th>
                                <th>Unidade</th>
                                <th>Qtd. Atual</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-estoque"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-movimentacoes" class="tab-content">
                <header class="tab-header">
                    <h2>Histórico</h2>
                    <button class="btn-primary" onclick="openModal('modal-mov')">+ Nova Saída/Entrada</button>
                </header>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Item</th>
                                <th>Tipo</th>
                                <th>Qtd.</th>
                                <th>Unidade</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-movs"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-item" class="modal-overlay">
        <div class="modal">
            <h3>Cadastrar Material</h3>
            <div class="campo-grupo">
                <label>Nome:</label>
                <input type="text" id="item-nome">
            </div>
            <div class="campo-grupo">
                <label>Unidade:</label>
                <select id="item-unidade" class="estilo-select">
                    <option value="un">Unidade (UN)</option>
                    <option value="kg">Quilograma (KG)</option>
                    <option value="mts">Metros (MTS)</option>
                    <option value="cm">Centímetros (CM)</option>
                    <option value="mm2">mm²</option>
                    <option value="cx">Caixa (CX)</option>
                </select>
            </div>
            <div class="modal-btns">
                <button onclick="closeModal('modal-item')">Cancelar</button>
                <button class="btn-primary" onclick="saveItem()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-mov" class="modal-overlay">
        <div class="modal">
            <h3>Movimentar Estoque</h3>
            <div class="campo-grupo">
                <label>Item:</label>
                <select id="mov-item-select" class="estilo-select"></select>
            </div>
            <div class="campo-grupo">
                <label>Tipo:</label>
                <select id="mov-tipo" class="estilo-select">
                    <option value="entrada">Entrada (+)</option>
                    <option value="saida">Saída (-)</option>
                </select>
            </div>
            <div class="campo-grupo">
                <label>Quantidade:</label>
                <input type="number" id="mov-qtd">
            </div>
            <div class="modal-btns">
                <button onclick="closeModal('modal-mov')">Cancelar</button>
                <button class="btn-primary" onclick="saveMov()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
