<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELETROGUARA 67 - Gestão de Estoque</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loading">Carregando dados...</div>

    <div id="app-interface" style="display:none">
        <aside class="sidebar">
            <div class="logo">ELETROGUARA 67</div>
            <nav>
                <button onclick="showTab('estoque')">📦 Estoque</button>
                <button onclick="showTab('movimentacoes')">🔄 Movimentações</button>
                <button onclick="reconfig()" class="btn-sec">⚙️ Reconfigurar</button>
            </nav>
        </aside>

        <main class="main-content">
            <section id="tab-estoque" class="tab-content active">
                <header class="tab-header">
                    <h2>Inventário de Materiais</h2>
                    <button class="btn-primary" onclick="openModal('modal-item')">+ Novo Item</button>
                </header>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Material</th>
                                <th>Categoria</th>
                                <th>Unidade</th> <th>Qtd. Atual</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-estoque"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-movimentacoes" class="tab-content">
                <header class="tab-header">
                    <h2>Histórico de Movimentações</h2>
                    <button class="btn-primary" onclick="openModal('modal-mov')">+ Nova Movimentação</button>
                </header>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Item</th>
                                <th>Tipo</th>
                                <th>Qtd.</th>
                                <th>Unidade</th> </tr>
                        </thead>
                        <tbody id="tbody-movs"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-item" class="modal-overlay">
        <div class="modal">
            <h3>Cadastrar Novo Material</h3>
            <div class="campo-grupo">
                <label>Nome do Material:</label>
                <input type="text" id="item-nome" placeholder="Ex: Cabo Flexível 2.5mm">
            </div>
            <div class="campo-grupo">
                <label>Unidade de Medida:</label>
                <select id="item-unidade" class="estilo-select">
                    <option value="un">Unidade (UN)</option>
                    <option value="kg">Quilograma (KG)</option>
                    <option value="mts">Metros (MTS)</option>
                    <option value="cm">Centímetros (CM)</option>
                    <option value="mm2">Milímetros Quadrados (mm²)</option>
                    <option value="m2">Metro Quadrado (M2)</option>
                    <option value="cx">Caixa (CX)</option>
                    <option value="lt">Litro (LT)</option>
                </select>
            </div>
            <div class="modal-btns">
                <button onclick="closeModal('modal-item')">Cancelar</button>
                <button class="btn-primary" onclick="saveItem()">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-mov" class="modal-overlay">
        <div class="modal">
            <h3>Registrar Entrada/Saída</h3>
            <div class="campo-grupo">
                <label>Selecione o Item:</label>
                <select id="mov-item-select" class="estilo-select"></select>
            </div>
            <div class="campo-grupo">
                <label>Quantidade:</label>
                <input type="number" id="mov-qtd">
            </div>
            <div class="campo-grupo">
                <label>Unidade Usada:</label>
                <select id="mov-unidade" class="estilo-select">
                    <option value="un">Unidade (UN)</option>
                    <option value="kg">Quilograma (KG)</option>
                    <option value="mts">Metros (MTS)</option>
                    <option value="cm">Centímetros (CM)</option>
                    <option value="mm2">Milímetros Quadrados (mm²)</option>
                    <option value="m2">Metro Quadrado (M2)</option>
                    <option value="cx">Caixa (CX)</option>
                    <option value="lt">Litro (LT)</option>
                </select>
            </div>
            <div class="modal-btns">
                <button onclick="closeModal('modal-mov')">Cancelar</button>
                <button class="btn-primary" onclick="saveMov()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
